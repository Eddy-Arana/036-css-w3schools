<!DOCTYPE html>
<html lang="es">

<head>

    <!-- =====================================================
         Lección 18 - CSS Links
         Aprende a personalizar enlaces con CSS.
         En esta lección veremos:
         1. Estados de un enlace
         2. text-decoration
         3. background-color
         4. Diferentes estilos
         5. Botones con enlaces
         6. Cursores
    ====================================================== -->

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Lección 18 - CSS Links</title>

    <style>

        /* ===============================
           Estilos generales
        =============================== */

        body{

            font-family: Arial, Helvetica, sans-serif;
            background:#f4f4f4;
            margin:40px;

        }

        h1{

            text-align:center;
            color:#0d6efd;

        }

        section{

            background:white;
            padding:25px;
            margin-top:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.15);

        }

        h2{

            color:#333;

        }

        /* ===============================
           Estados del enlace
        =============================== */

        .estado:link{

            color:red;

        }

        .estado:visited{

            color:green;

        }

        .estado:hover{

            color:hotpink;

        }

        .estado:active{

            color:blue;

        }

        /* ===============================
           Text Decoration
        =============================== */

        .decoracion:link,
        .decoracion:visited{

            text-decoration:none;
            color:#0066cc;

        }

        .decoracion:hover{

            text-decoration:underline;

        }

        .decoracion:active{

            color:red;

        }

        /* ===============================
           Background Color
        =============================== */

        .fondo:link{

            background:yellow;

        }

        .fondo:visited{

            background:cyan;

        }

        .fondo:hover{

            background:lightgreen;

        }

        .fondo:active{

            background:hotpink;

        }

        .fondo{

            padding:5px 10px;

        }

        /* ===============================
           Link tipo botón
        =============================== */

        .boton:link,
        .boton:visited{

            background:#f44336;
            color:white;
            padding:12px 20px;
            text-decoration:none;
            display:inline-block;
            border-radius:6px;

        }

        .boton:hover,
        .boton:active{

            background:red;

        }

        /* ===============================
           Segundo botón
        =============================== */

        .boton2:link,
        .boton2:visited{

            background:white;
            color:green;
            border:2px solid green;
            padding:12px 20px;
            text-decoration:none;
            display:inline-block;
            border-radius:6px;

        }

        .boton2:hover{

            background:green;
            color:white;

        }

        /* ===============================
           Cursores
        =============================== */

        .cursores span{

            display:inline-block;
            margin:10px;
            padding:8px;
            border:1px solid #ccc;

        }

        .pointer{cursor:pointer;}
        .help{cursor:help;}
        .wait{cursor:wait;}
        .move{cursor:move;}
        .crosshair{cursor:crosshair;}

    </style>

</head>

<body>

    <h1>Lección 18 - CSS Links</h1>

    <!-- ===============================
         Estados de un enlace
    =============================== -->

    <section>

        <h2>1. Estados del enlace</h2>

        <p>
            Pase el cursor sobre el siguiente enlace:
        </p>

        <a href="https://www.google.com"
           class="estado"
           target="_blank">

            Visitar Google

        </a>

    </section>

    <!-- ===============================
         Text Decoration
    =============================== -->

    <section>

        <h2>2. Text Decoration</h2>

        <a href="#"
           class="decoracion">

            Enlace sin subrayado

        </a>

    </section>

    <!-- ===============================
         Background Color
    =============================== -->

    <section>

        <h2>3. Background Color</h2>

        <a href="#"
           class="fondo">

            Enlace con fondo

        </a>

    </section>

    <!-- ===============================
         Link Button
    =============================== -->

    <section>

        <h2>4. Botón con enlace</h2>

        <a href="#"
           class="boton">

            Botón rojo

        </a>

        <br><br>

        <a href="#"
           class="boton2">

            Botón verde

        </a>

    </section>

    <!-- ===============================
         Cursores
    =============================== -->

    <section>

        <h2>5. Cursores</h2>

        <div class="cursores">

            <span class="pointer">Pointer</span>

            <span class="help">Help</span>

            <span class="wait">Wait</span>

            <span class="move">Move</span>

            <span class="crosshair">Crosshair</span>

        </div>

    </section>

</body>

</html>
